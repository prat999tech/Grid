# ---------- Database (PostgreSQL) ----------
# Create the database once with:  createdb gridapp     (or:  CREATE DATABASE gridapp;)
# Override any of these with environment variables when running.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gridapp}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate creates/updates the tables automatically from our @Entity classes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---------- Grid configuration ----------
# The board is grid.cols x grid.rows tiles. 40 x 25 = 1000 tiles ("hundreds of blocks").
grid.cols=40
grid.rows=25

# ---------- Game rules ----------
# A user must wait this many milliseconds between two captures (anti-spam cooldown).
grid.cooldown-ms=800

# ---------- Async worker pool ----------
# Thread pool that processes tile captures off the WebSocket receiving thread.
grid.async.core-pool-size=4
grid.async.max-pool-size=8
grid.async.queue-capacity=500

# Hosting platforms (Render, Railway, …) inject the port to listen on via PORT.
server.port=${PORT:8080}
