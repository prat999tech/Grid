<header class="bar">
  <div class="brand">
    <span class="mark">◧</span>
    <span class="title">Capture Grid</span>
  </div>

  <div class="stats">
    <div class="chip" [class.live]="store.connected()" [class.down]="!store.connected()">
      <span class="dot"></span>
      {{ store.connected() ? 'Live' : 'Connecting…' }}
    </div>

    <div class="chip">
      <span class="ico">●</span>
      {{ store.online() }} online
    </div>

    @if (store.user(); as me) {
      <div class="chip">
        <span class="swatch" [style.background]="me.color"></span>
        {{ me.name }}
      </div>
      <div class="chip score">
        {{ store.myTiles() }} tiles
      </div>
    }
  </div>
</header>
